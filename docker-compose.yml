version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: plant-management-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: plant_management
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - plant-network

  # Backend API Server
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: plant-management-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      RDS_HOST: mysql
      RDS_USER: admin
      RDS_PASSWORD: admin123
      RDS_DATABASE: plant_management
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./Backend/src:/app/src
      - /app/node_modules
    networks:
      - plant-network
    restart: unless-stopped

  # Frontend App
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: plant-management-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./Frontend/src:/app/src
      - /app/node_modules
    networks:
      - plant-network
    restart: unless-stopped

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: plant-management-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - plant-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: plant-management-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - plant-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  plant-network:
    driver: bridge
